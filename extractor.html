<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Video to WebP Sequence Extractor</title>
    <!-- Library untuk membuat file ZIP di browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Library untuk memunculkan tombol Download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #111; color: #fff; }
        .box { border: 2px dashed #555; padding: 2rem; border-radius: 8px; text-align: center; }
        #status { margin-top: 1rem; font-weight: bold; color: #4CAF50; }
        canvas { max-width: 100%; height: auto; margin-top: 1rem; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Pengekstrak Video Menjadi Ratusan WebP</h2>
        <p>Alat ini berjalan langsung di browser Anda. Tidak perlu install apapun.</p>
        <input type="file" id="upload" accept="video/mp4,video/webm,video/quicktime">
        <div id="status">Menunggu video...</div>
        <canvas id="canvas" style="display: none;"></canvas>
    </div>

    <script>
        const TARGET_FRAMES = 192; // Sesuai permintaan Anda
        
        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const video = document.createElement('video');
            video.src = url;
            video.muted = true;
            video.playsInline = true;

            const status = document.getElementById('status');
            const canvas = document.getElementById('canvas');
            status.textContent = 'Memuat video...';

            video.onloadedmetadata = () => {
                const duration = video.duration;
                if (!duration || !isFinite(duration)) {
                    status.textContent = 'Error: Durasi video tidak terbaca.';
                    return;
                }

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.style.display = 'block';
                const ctx = canvas.getContext('2d');

                const zip = new JSZip();
                let currentFrame = 1;
                // Hitung interval waktu setiap frame agar pas menjadi 192 frame
                const step = duration / TARGET_FRAMES; 

                status.textContent = `Mulai mengekstrak ${TARGET_FRAMES} frame...`;

                const extractFrame = () => {
                    if (currentFrame > TARGET_FRAMES) {
                        status.textContent = 'Selesai mengekstrak! Sedang membuat file ZIP (harap tunggu beberapa detik)...';
                        zip.generateAsync({ type: 'blob' }).then(function(content) {
                            saveAs(content, 'sequence.zip');
                            status.textContent = 'Selesai! File sequence.zip berhasil didownload.';
                            canvas.style.display = 'none';
                        });
                        return;
                    }

                    // Lompat ke detik tertentu di video
                    // Hindari 0 persis atau ujung persis agar tidak error
                    const time = Math.min((currentFrame - 1) * step, duration - 0.05);
                    video.currentTime = time;
                };

                // Ketika video berhasil melompat ke detik yang diminta
                video.onseeked = () => {
                    // Gambar frame ke canvas
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Convert canvas menjadi WebP (Quality 85%)
                    canvas.toBlob((blob) => {
                        // Nama file: 0001.webp, 0002.webp, dst...
                        const filename = String(currentFrame).padStart(4, '0') + '.webp';
                        zip.file(filename, blob);
                        
                        status.textContent = `Mengekstrak: Frame ${currentFrame} dari ${TARGET_FRAMES} ...`;
                        currentFrame++;
                        
                        // Ekstrak frame berikutnya
                        extractFrame();
                    }, 'image/webp', 0.85);
                };

                // Mulai
                extractFrame();
            };
        });
    </script>
</body>
</html>
