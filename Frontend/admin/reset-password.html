<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Portfolio AWL</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <h1>AWL<span>.</span></h1>
        <p>Reset Password</p>
      </div>
      <form id="resetForm" class="login-form">
        <div class="form-group">
          <label for="newPassword">Password Baru</label>
          <input type="password" id="newPassword" placeholder="Masukkan password baru" required />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Konfirmasi Password Baru</label>
          <input type="password" id="confirmPassword" placeholder="Ketik ulang password baru" required />
        </div>
        <button type="submit" class="btn-login" id="btnReset">
          <span>Ubah Password</span>
        </button>
        <p class="login-error" id="resetMessage" style="margin-top: 1rem;"></p>
        <div style="text-align: center; margin-top: 1rem;">
          <a href="/login" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">&larr; Kembali ke Login</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const form = document.getElementById('resetForm');
    const resetMessage = document.getElementById('resetMessage');
    const btn = document.getElementById('btnReset');

    if (!token) {
      resetMessage.style.color = 'var(--danger)';
      resetMessage.textContent = 'Token tidak ditemukan. Link mungkin tidak valid.';
      btn.disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resetMessage.textContent = '';
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        resetMessage.style.color = 'var(--danger)';
        resetMessage.textContent = 'Password tidak cocok.';
        return;
      }

      btn.disabled = true;
      btn.querySelector('span').textContent = 'Memproses...';

      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: newPassword })
        });
        const data = await res.json();

        if (res.ok) {
          resetMessage.style.color = 'var(--primary)';
          resetMessage.textContent = data.message;
          setTimeout(() => {
            window.location.href = '/login';
          }, 3000);
        } else {
          resetMessage.style.color = 'var(--danger)';
          resetMessage.textContent = data.error || 'Terjadi kesalahan';
          btn.disabled = false;
          btn.querySelector('span').textContent = 'Ubah Password';
        }
      } catch (err) {
        resetMessage.style.color = 'var(--danger)';
        resetMessage.textContent = 'Gagal menghubungi server';
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Ubah Password';
      }
    });
  </script>
</body>
</html>
