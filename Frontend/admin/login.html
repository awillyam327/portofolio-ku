<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Portfolio AWL</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <h1>AWL<span>.</span></h1>
        <p>Admin Dashboard</p>
      </div>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Masukkan username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Masukkan password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login" id="btnLogin">
          <span>Masuk</span>
        </button>
        <p class="login-error" id="loginError"></p>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('btnLogin');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      btn.disabled = true;
      btn.querySelector('span').textContent = 'Memproses...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('admin_name', data.user.username);
          window.location.href = '/admin/dashboard.html';
        } else {
          errorEl.textContent = data.error || 'Login gagal.';
        }
      } catch (err) {
        errorEl.textContent = 'Koneksi gagal. Coba lagi.';
      } finally {
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Masuk';
      }
    });
  </script>
</body>
</html>
