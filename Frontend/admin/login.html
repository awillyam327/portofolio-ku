<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Portfolio AWL</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <h1>AWL<span>.</span></h1>
        <p>Admin Dashboard</p>
      </div>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login" id="btnLogin">
          <span>Login</span>
        </button>
        <p class="login-error" id="loginError"></p>
        <div style="text-align: center; margin-top: 1rem;">
          <a href="#" id="forgotBtn" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay" id="forgotModal">
    <div class="modal" style="display: block; max-width: 400px; padding: 2rem;">
      <div class="modal__header">
        <h3>Forgot Password</h3>
        <button class="modal__close" id="forgotClose">&times;</button>
      </div>
      <form id="forgotForm" class="modal__body">
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem;">
          Enter your username. A password reset link will be sent to the email registered in your profile.
        </p>
        <div class="form-group">
          <label for="forgotUsername">Username</label>
          <input type="text" id="forgotUsername" placeholder="Enter username" required />
        </div>
        <button type="submit" class="btn btn--primary" id="btnForgot" style="width: 100%;">Send Reset Link</button>
        <p id="forgotMessage" style="margin-top: 1rem; font-size: 0.9rem; text-align: center;"></p>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('btnLogin');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      btn.disabled = true;
      btn.querySelector('span').textContent = 'Processing...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('admin_name', data.user.username);
          window.location.href = '/admin/dashboard.html';
        } else {
          errorEl.textContent = data.error || 'An error occurred';
        }
      } catch (err) {
        errorEl.textContent = 'Failed to connect to server';
      } finally {
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Login';
      }
    });

    // Forgot Password Logic
    const forgotBtn = document.getElementById('forgotBtn');
    const forgotModal = document.getElementById('forgotModal');
    const forgotClose = document.getElementById('forgotClose');
    const forgotForm = document.getElementById('forgotForm');
    const btnForgot = document.getElementById('btnForgot');
    const forgotMessage = document.getElementById('forgotMessage');

    forgotBtn.addEventListener('click', (e) => {
      e.preventDefault();
      forgotModal.classList.add('open');
      forgotMessage.textContent = '';
      forgotMessage.style.color = '';
    });

    forgotClose.addEventListener('click', () => {
      forgotModal.classList.remove('open');
    });

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      forgotMessage.textContent = '';
      btnForgot.disabled = true;
      btnForgot.textContent = 'Sending...';

      const username = document.getElementById('forgotUsername').value.trim();

      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        const result = await res.json();

        if (res.ok) {
          forgotMessage.style.color = 'var(--primary)';
          forgotMessage.textContent = result.message;
        } else {
          forgotMessage.style.color = '#ff3333'; // Red for error
          forgotMessage.textContent = result.error || 'A server error occurred while sending email';
        }
      } catch (error) {
        forgotMessage.style.color = '#ff3333'; // Red for error
        forgotMessage.textContent = 'Network connection error occurred';
        console.error(error);
      } finally {
        btnForgot.disabled = false;
        btnForgot.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
