<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin — Portfolio AWL</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__logo">
        <h2>AWL<span>.</span></h2>
        <small>Admin Panel</small>
      </div>
      <nav class="sidebar__nav">
        <a href="#" class="sidebar__link active" data-page="dashboard"><i class="ph ph-squares-four"></i> Dashboard</a>
        <a href="#" class="sidebar__link" data-page="profil"><i class="ph ph-user"></i> Profil</a>
        <a href="#" class="sidebar__link" data-page="experiences"><i class="ph ph-briefcase"></i> Pengalaman</a>
        <a href="#" class="sidebar__link" data-page="projects"><i class="ph ph-folder-open"></i> Proyek</a>
        <a href="#" class="sidebar__link" data-page="case_studies"><i class="ph ph-presentation-chart"></i> Case Studies</a>
        <a href="#" class="sidebar__link" data-page="certificates"><i class="ph ph-certificate"></i> Certificates</a>
        <a href="#" class="sidebar__link" data-page="skills"><i class="ph ph-lightning"></i> Skills</a>
        <a href="#" class="sidebar__link" data-page="contacts"><i class="ph ph-chat-dots"></i> Kontak</a>
        <a href="#" class="sidebar__link" data-page="blogs"><i class="ph ph-article"></i> Blog</a>
      </nav>
      <button class="sidebar__logout" id="btnLogout"><i class="ph ph-sign-out"></i> Logout</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <h1 id="pageTitle">Dashboard</h1>
        <span id="adminName">Admin</span>
      </header>

      <div class="content-area" id="contentArea">
        <!-- Content injected by JS -->
      </div>
    </main>
  </div>

  <!-- Modal for Create/Edit -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal__header">
        <h3 id="modalTitle">Tambah Data</h3>
        <button class="modal__close" id="modalClose">&times;</button>
      </div>
      <form id="modalForm" class="modal__body">
        <div id="modalFields">
          <!-- Fields injected by JS -->
        </div>
        <div class="modal__footer">
          <button type="button" class="btn btn--secondary" id="modalCancel">Batal</button>
          <button type="submit" class="btn btn--primary" id="modalSubmit">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/admin/js/admin.js"></script>
</body>
</html>
